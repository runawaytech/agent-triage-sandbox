name: Agent B — implement

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

concurrency:
  group: agent-b-${{ github.event.issue.number }}
  cancel-in-progress: false

# Triggers:
# - Issue gains label `ai-triage` (implement mode).
# - Issue comment starts with `@agent-b retry` (implement mode, re-run).
# - PR comment starts with `@agent-b address-review` (address-review mode).
# Skip if the issue/PR is paused, already being worked on, or escalated.
jobs:
  agent-b:
    if: |
      (
        github.event_name == 'issues' &&
        github.event.action == 'labeled' &&
        github.event.label.name == 'ai-triage'
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request == null &&
        startsWith(github.event.comment.body, '@agent-b retry')
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        startsWith(github.event.comment.body, '@agent-b address-review')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.TRIAGE_APP_ID }}
          private-key: ${{ secrets.TRIAGE_APP_PRIVATE_KEY }}

      - name: Detect mode
        id: mode
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ] \
             && [ -n "${{ github.event.issue.pull_request.url }}" ] \
             && [[ "${{ github.event.comment.body }}" == "@agent-b address-review"* ]]; then
            echo "mode=address-review" >> "$GITHUB_OUTPUT"
            echo "pr_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "mode=implement" >> "$GITHUB_OUTPUT"
          fi

      - name: Check blockers
        id: guard
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          N="${{ github.event.issue.number }}"
          for blocker in paused agent-working needs-human; do
            if gh api "repos/${{ github.repository }}/issues/$N/labels" --jq '.[].name' | grep -Fxq "$blocker"; then
              echo "skip: issue #$N has label $blocker"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Compute agent branch name
        id: branch
        if: steps.guard.outputs.skip != 'true' && steps.mode.outputs.mode == 'implement'
        run: |
          N="${{ github.event.issue.number }}"
          # Slug from issue title: lowercase → collapse non-alnum into '-' →
          # strip leading/trailing '-' → cap at 40 chars → strip trailing '-'
          # again in case the cut created one mid-hyphen.
          TITLE=$(gh api "repos/${{ github.repository }}/issues/$N" --jq '.title')
          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '-' | sed 's/^-//;s/-$//' | cut -c1-40 | sed 's/-$//')
          [ -z "$SLUG" ] && SLUG="untitled"
          BRANCH="ai/issue-${N}-${SLUG}"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "Branch will be: $BRANCH"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Mark agent-working
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          source .github/scripts/lib/labels.sh
          add_label "${{ github.event.issue.number }}" agent-working

      - if: steps.guard.outputs.skip != 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        if: steps.guard.outputs.skip != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Load Agent B system prompt
        id: sysprompt
        if: steps.guard.outputs.skip != 'true'
        run: |
          {
            echo 'content<<AGENTBEOF'
            cat .github/agents/agent-b.system.md
            echo 'AGENTBEOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code Action (Agent B — implement)
        if: steps.guard.outputs.skip != 'true' && steps.mode.outputs.mode == 'implement'
        uses: anthropics/claude-code-action@5d5c10a4f389689f992ea10bb14dcb6fcc83146d # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          trigger_phrase: 'agent-b'
          show_full_output: true
          claude_args: |
            --permission-mode bypassPermissions
            --max-turns 80
          prompt: |
            ${{ steps.sysprompt.outputs.content }}

            ---

            A new issue has been labeled `ai-triage`:
              repo: ${{ github.repository }}
              issue: #${{ github.event.issue.number }}
            Follow the system prompt above. Post the four-question
            investigation comment first. Then the plan checklist. Then
            create a branch named EXACTLY `${{ steps.branch.outputs.name }}`
            (do not choose a different slug), implement the fix step by
            step, run `bash .github/scripts/verify.sh`, commit the
            screenshots artifact reference, push, and open a PR targeting
            `develop` with label `ai-pr`. If any step fails three times,
            stop and label the issue `needs-human`.

      - name: Run Claude Code Action (Agent B — address-review)
        if: steps.guard.outputs.skip != 'true' && steps.mode.outputs.mode == 'address-review'
        uses: anthropics/claude-code-action@5d5c10a4f389689f992ea10bb14dcb6fcc83146d # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          trigger_phrase: 'agent-b'
          show_full_output: true
          claude_args: |
            --permission-mode bypassPermissions
            --max-turns 80
          prompt: |
            ${{ steps.sysprompt.outputs.content }}

            ---

            You are responding to Agent C's review on PR #${{ steps.mode.outputs.pr_number }} in ${{ github.repository }}.

            Steps:
            1. `gh pr checkout ${{ steps.mode.outputs.pr_number }}`.
            2. Read Agent C's latest `## Review — round N` comment with
               `gh pr view ${{ steps.mode.outputs.pr_number }} --comments`.
            3. For each BLOCKER and IMPORTANT item, decide ACCEPT / PARTIAL / REJECT per your REVIEW RESPONSE POLICY.
               - REJECT requires citing (a) convention file:line, (b) a CORE PRINCIPLE, or (c) out-of-scope.
               - Do NOT capitulate to pressure — stand firm when justified.
            4. Apply accepted fixes, commit with Conventional Commit messages
               referencing the issue number.
            5. Run `bash .github/scripts/verify.sh` — retry up to 3 times on failure.
            6. Push the commits to the PR branch.
            7. Post ONE PR comment titled `## Rebuttal — round N` listing each
               point with ACCEPT / PARTIAL / REJECT and the commit SHA.
            8. Do NOT merge. Do NOT close. Agent C will re-review automatically
               via `synchronize`.

            If this is already round 3 and you see the same point re-raised
            without new evidence, do NOT change the code; post a rebuttal
            restating your position and let the workflow escalate.

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-screenshots-${{ github.event.issue.number }}
          path: playwright-artifacts/
          if-no-files-found: ignore

      - name: Run protected-paths guard on the produced branch
        if: success() && steps.guard.outputs.skip != 'true' && steps.mode.outputs.mode == 'implement'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Agent B should have pushed the computed branch + opened a PR.
          # We use the exact branch name from the earlier step (no glob).
          BRANCH='${{ steps.branch.outputs.name }}'
          PR_NUMBER=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found for branch $BRANCH — Agent B may have stopped early."
            exit 0
          fi
          # Check the branch out locally so the diff command in the guard works.
          # Agent B pushes + checks out the branch in the shared working tree,
          # so we may already be on it. Update the remote ref without the
          # local-ref refspec, then only switch branches if needed.
          git fetch origin "$BRANCH"
          if [ "$(git symbolic-ref --short -q HEAD)" != "$BRANCH" ]; then
            git checkout "$BRANCH"
          fi
          bash .github/scripts/guard-protected-paths.sh develop "$PR_NUMBER"

      - name: Notify — PR ready for review
        if: success() && steps.guard.outputs.skip != 'true' && steps.mode.outputs.mode == 'implement'
        uses: ./.github/actions/discord-notify
        with:
          webhook_url: ${{ secrets.DISCORD_NOTIFY_WEBHOOK_URL }}
          content: |
            📝 **New AI PR ready for review**
            Issue: ${{ github.server_url }}/${{ github.repository }}/issues/${{ github.event.issue.number }}
            Branch: `${{ steps.branch.outputs.name }}`
            Agent C is reviewing automatically.

      - name: Remove agent-working label
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          source .github/scripts/lib/labels.sh
          remove_label "${{ github.event.issue.number }}" agent-working

      - name: Escalate on workflow failure
        if: failure()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          source .github/scripts/lib/labels.sh
          add_label "${{ github.event.issue.number }}" needs-human
          gh issue comment "${{ github.event.issue.number }}" \
            --body "Agent B workflow failed. Run log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
